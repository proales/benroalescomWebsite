<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Ben Roales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .announcement-container {
            background-color: white;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }
        
        .polaroid-frame {
            background-color: white;
            padding: 15px 15px 60px 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .baby-photo {
            width: 100%;
            height: 350px;
            background-color: #e0e0e0;
            background-image: url('ben2.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        
        h1 {
            font-family: 'Playfair+Display', serif;
            font-size: 3em;
            font-weight: 400;
            text-align: center;
            margin-bottom: 10px;
            font-style: italic;
            color: #333;
        }
        
        .baby-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8em;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
            color: #555;
        }
        
        .birth-info {
            text-align: center;
            font-size: 0.9em;
            line-height: 1.8;
            color: #666;
            font-style: italic;
        }
        
        .birth-date {
            font-weight: 400;
            color: #444;
            margin: 5px 0;
        }
        
        .measurements {
            font-size: 0.85em;
            color: #777;
        }
        
        .decorative-line {
            width: 50px;
            height: 1px;
            background-color: #ddd;
            margin: 15px auto;
        }
        
        @media (max-width: 480px) {
            .announcement-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2.5em;
            }
            
            .baby-name {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="announcement-container">
        <div class="polaroid-frame">
            <div class="baby-photo">
                <div class="bow-headband"></div>
            </div>
        </div>
        
        <h1>Meet</h1>
        <p class="baby-name">Benjamin Tyler Roales</p>
        
        <div class="decorative-line"></div>
        
        <div class="birth-info">
            <p>Born on <span class="birth-date">August 4th</span></p>
            <p class="measurements">7 pounds, 3 ounces | 20 inches</p>
        </div>
    </div>
</body>
</html>
